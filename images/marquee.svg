<svg fill="none" viewBox="0 0 800 100" width="100%" height="100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 30px;
      font-weight: bold;
      animation: typewriter 4s steps(30) infinite alternate;
      white-space: nowrap;
      
      /* DEFAULT COLOR: LIGHT MODE */
      fill: #24292e; 
      border-right: 2px solid #24292e;
    }

    @keyframes typewriter {
      0% { width: 0; }
      100% { width: 100%; }
    }

    /* GITHUB DARK MODE DETECTOR */
    @media (prefers-color-scheme: dark) {
      .text {
        fill: #FFFFFF !important;
        border-right: 2px solid #FFFFFF !important;
      }
    }
  </style>

  <g>
    <foreignObject x="0" y="0" width="800" height="100">
      <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100px;">
        <h1 class="text" style="margin: 0; overflow: hidden;">Hi there! I'm MINISNAKE88</h1>
      </div>
    </foreignObject>
  </g>
</svg>


